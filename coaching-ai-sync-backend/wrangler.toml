name = "coaching-ai-sync"
main = "worker.js"
compatibility_date = "2025-01-01"

[triggers]
crons = ["0 * * * *"]

[vars]
DEFAULT_ATHLETE_ID = "kevin"
INTERVALS_API_URL = "https://intervals.icu/api/v1/athlete/0/activities?oldest=2020-01-01&limit=1"
INTERVALS_AUTH_HEADER = "Authorization"
INTERVALS_AUTH_PREFIX = "Bearer"

# Set as secrets with `wrangler secret put`:
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# INTERVALS_API_KEY
# CLIENT_SYNC_TOKEN
# ADMIN_SYNC_KEY
